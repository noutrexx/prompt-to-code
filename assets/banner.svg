<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/><stop offset="1" stop-color="#04060d"/>
    </linearGradient>
    <radialGradient id="g1" cx="14%" cy="0%" r="60%">
      <stop offset="0" stop-color="#4d7cfe" stop-opacity="0.26"/><stop offset="1" stop-color="#4d7cfe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="8%" r="58%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.24"/><stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cfe0ff"/><stop offset="0.5" stop-color="#4d7cfe"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4d7cfe"/><stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1124"/><stop offset="1" stop-color="#0a0716"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#g1)"/>
  <rect width="1200" height="340" fill="url(#g2)"/>

  <!-- Sharp grid -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.04">
    <line x1="0" y1="85" x2="1200" y2="85"/><line x1="0" y1="170" x2="1200" y2="170"/><line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="300" y1="0" x2="300" y2="340"/><line x1="600" y1="0" x2="600" y2="340"/><line x1="900" y1="0" x2="900" y2="340"/>
  </g>

  <!-- Background area + candles (right) -->
  <path d="M650,235 C720,215 760,250 820,230 C880,210 920,170 990,185 C1060,200 1110,140 1180,160 L1180,300 L650,300 Z" fill="#4d7cfe" opacity="0.06"/>
  <polyline fill="none" stroke="url(#line)" stroke-width="2.5" opacity="0.55"
    points="650,235 720,215 760,250 820,230 880,210 920,170 990,185 1060,200 1110,140 1180,160"/>
  <g>
    <line x1="700" y1="180" x2="700" y2="250" stroke="#2ebd85" stroke-width="2"/><rect x="692" y="200" width="16" height="38" fill="#2ebd85"/>
    <line x1="745" y1="170" x2="745" y2="240" stroke="#f6465d" stroke-width="2"/><rect x="737" y="188" width="16" height="34" fill="#f6465d"/>
    <line x1="790" y1="165" x2="790" y2="235" stroke="#2ebd85" stroke-width="2"/><rect x="782" y="185" width="16" height="40" fill="#2ebd85"/>
    <line x1="835" y1="150" x2="835" y2="215" stroke="#2ebd85" stroke-width="2"/><rect x="827" y="165" width="16" height="38" fill="#2ebd85"/>
    <line x1="880" y1="140" x2="880" y2="205" stroke="#f6465d" stroke-width="2"/><rect x="872" y="158" width="16" height="32" fill="#f6465d"/>
    <line x1="925" y1="150" x2="925" y2="210" stroke="#2ebd85" stroke-width="2"/><rect x="917" y="168" width="16" height="34" fill="#2ebd85"/>
    <line x1="970" y1="120" x2="970" y2="185" stroke="#2ebd85" stroke-width="2"/><rect x="962" y="138" width="16" height="38" fill="#2ebd85"/>
    <line x1="1015" y1="115" x2="1015" y2="175" stroke="#f6465d" stroke-width="2"/><rect x="1007" y="130" width="16" height="30" fill="#f6465d"/>
    <line x1="1060" y1="105" x2="1060" y2="165" stroke="#2ebd85" stroke-width="2"/><rect x="1052" y="120" width="16" height="36" fill="#2ebd85"/>
    <line x1="1105" y1="95" x2="1105" y2="150" stroke="#2ebd85" stroke-width="2"/><rect x="1097" y="108" width="16" height="34" fill="#2ebd85"/>
  </g>
  <g font-size="12" font-weight="700" font-family="JetBrains Mono, monospace">
    <path d="M700,255 l-6,10 h12 z" fill="#2ebd85"/><text x="700" y="285" fill="#2ebd85" text-anchor="middle">BUY</text>
    <path d="M880,125 l-6,-10 h12 z" fill="#f6465d"/><text x="880" y="118" fill="#f6465d" text-anchor="middle">SELL</text>
  </g>

  <!-- Logo emblem (sharp) -->
  <g>
    <rect x="60" y="120" width="60" height="60" fill="url(#lg)"/>
    <rect x="60" y="120" width="60" height="60" fill="none" stroke="url(#line)" stroke-width="2"/>
    <rect x="60" y="120" width="60" height="3" fill="#38e1ff"/>
    <path d="M72 139 L81 150 L72 161" fill="none" stroke="#38e1ff" stroke-width="3.2" stroke-linecap="square"/>
    <rect x="88" y="152" width="5" height="14" fill="#4d7cfe"/>
    <rect x="97" y="144" width="5" height="22" fill="#a855f7"/>
    <rect x="106" y="136" width="5" height="30" fill="#38e1ff"/>
  </g>

  <!-- Wordmark -->
  <text x="142" y="152" font-size="46" font-weight="800" fill="url(#title)" letter-spacing="-1">Prompt-to-Code</text>
  <text x="144" y="188" font-size="18" fill="#9aa7c2">Natural language to executable trading strategy, backtested on real data</text>

  <!-- Sharp tags -->
  <g font-size="12.5" font-weight="600" font-family="JetBrains Mono, monospace">
    <rect x="144" y="210" width="120" height="28" fill="none" stroke="#4d7cfe" opacity="0.5"/>
    <text x="204" y="229" fill="#9db8ff" text-anchor="middle" opacity="1">AI / GEMINI</text>
    <rect x="274" y="210" width="96" height="28" fill="none" stroke="#2ebd85" opacity="0.5"/>
    <text x="322" y="229" fill="#2ebd85" text-anchor="middle">BACKTEST</text>
    <rect x="380" y="210" width="170" height="28" fill="none" stroke="#a855f7" opacity="0.5"/>
    <text x="465" y="229" fill="#c3b0ff" text-anchor="middle">BIST + COMMODITIES</text>
  </g>
</svg>
